<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/metronero.css">
    <link rel="stylesheet" href="/assets/forkawesome/css/fork-awesome.min.css">
    <link rel="icon" type="image/png" href="/assets/img/metronero.png" sizes="32x32">
    <title>{{ .PageTitle }} | Metronero</title>
  </head>
  <body>
  <nav class="navbar px-5 py-2 has-shadow" role="navigation" aria-label="main navigation">
  <input type="checkbox" id="toggler" class="toggler">
  <div class="navbar-brand">
    <a class="navbar-item" href="/merchant/dashboard">
      <img src="/assets/img/metronero-logo.png" alt="Metronero" width=100%>
    </a>

<label for="toggler" role="button" class="navbar-burger burger" aria-label="menu" aria-expanded="false" data-target="metronero-navbar">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </a>
</div>

<div class="navbar-menu" id="metronero-navbar">
    <div class="navbar-start">
    	  <hr class="navbar-divider">
          <a class="navbar-item is-hoverable is-hidden-desktop" target="new" href="/merchant/dashboard">Dashboard</a>
          <a class="navbar-item is-hoverable is-hidden-desktop" target="new" href="/merchant/template">Template</a>
          <a class="navbar-item is-hoverable is-hidden-desktop" target="new" href="/merchant/payments">Payments</a>
          <a class="navbar-item is-hoverable is-hidden-desktop" target="new" href="/merchant/withdrawals">Withdrawals</a>
          <div class="navbar-item is-hoverable is-hidden-desktop" target="new">
            <label for="lang-modal-toggle">
              <span class="icon is-large" aria-haspopup="true" aria-controls="dropdown-menu" >
              <i class="fa fa-2x fa-language" aria-hidden="true"></i>
              </span>
	    </label>
	<input id="lang-modal-toggle" type="checkbox" />
        <!-- Modal -->
        <div class="modal" id="lang-modal">
          <div class="modal-background"></div>
          <div class="modal-card">
            <header class="modal-card-head">
              <p class="modal-card-title">Change language</p>
            </header>
            <section class="modal-card-foot">
              <ul>
                <li><a href="/pref/en?back={{.curr_url}}">English</a></li>
                <li><a href="/pref/tr?back={{.curr_url}}">Türkçe</a></li>
                <li><a href="/pref/lt?back={{.curr_url}}">Lietuvių</a></li>
             </ul>
           </section>
	  </div>
       <label class="modal-close is-large" for="lang-modal-toggle"></label>
	</div>
     </div>

    </div>

    <div class="navbar-end">
      <div class="navbar-item is-hidden-touch">
      <p>{{ .Username }}</p>
      </div>
      <div class="navbar-item px-1 is-hidden-touch">
      <p>|</p>
      </div>
      <div class="navbar-item">
        <div class="field is-grouped">
          <p class="control">
            <a class="bd-tw-button button" href="/logout">
              <span>
                Sign out
              </span>
            </a>
          </p>
	</div>
      </div>
    </div>

</div>

  </div>
</nav>

<section class="section pt-5 px-5">

<div class="columns">
<div class="column is-narrow is-hidden-touch">
<aside class="menu" id="side-menu">
  <p class="menu-label">
    General
  </p>
  <ul class="menu-list">
    <li><a href="/merchant/dashboard">Dashboard</a></li>
  </ul>
  <p class="menu-label">
    Settings
  </p>
  <ul class="menu-list">
    <li><a href="/merchant/template">Template</a></li>
  </ul>
  <ul class="menu-list">
    <li><a href="#">Authentication</a></li>
  </ul>
  <p class="menu-label">
    Transactions
  </p>
  <ul class="menu-list">
    <li><a href="/merchant/payments">Payments</a></li>
    <li><a href="/merchant/withdrawals">Withdrawals</a></li>
  </ul>
</aside>

<div class="dropdown is-up">
  <input id="lang-toggle" type="checkbox" />
  <div class="dropdown-trigger">
    <button class="button lang-dropdown-button" aria-haspopup="true" aria-controls="dropdown-menu">
      <label for="lang-toggle">
      <span class="icon is-large" aria-haspopup="true" aria-controls="dropdown-menu" >
        <i class="fa fa-2x fa-language" aria-hidden="true"></i>
      </span>
</label>
    </button>
  </div>
  <div class="dropdown-menu" id="lang-menu" role="menu">
    <div class="dropdown-content">
      <div class="dropdown-item">
        <p><a href="/pref/en?back={{.curr_url}}">English</a></p>
      </div>
      <hr class="dropdown-divider">
      <div class="dropdown-item">
        <p><a href="/pref/tr?back={{.curr_url}}">Türkçe</a></p>
      </div>
      <hr class="dropdown-divider">
      <div class="dropdown-item">
        <p><a href="/pref/lt?back={{.curr_url}}">Lietuvių</a></p>
      </div>
    </div>
  </div>
</div>

</div>


<div class="column">
{{embed}}
</div>
</div>
  </body>
</html>
