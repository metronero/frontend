<section class="section">

        {{ if eq .Deleted "true" }}
        <article class="message is-primary">
        <div class="message-body">
          Merchant deleted successfully.
        </div>
        </article>
        {{ end }}

<p class="title is-spaced">Accounts</p>

<p class="subtitle">Select an account to configure.<p>

<div class="columns is-multiline is-mobile">
{{ range .Merchants }}
  <div class="column is-narrow">
    <a class="button is-info" href="/admin/merchants/{{ .AccountId }}">
    {{ .Name }}
    </a>
  </div>
{{ end }}
</div>

{{ if .Paging }}
<div class="field is-grouped is-grouped-centered">
  <p class="control">
    <a class="button is-primary">
      Prev
    </a>
  </p>
  <p class="control">
    <a class="button is-primary">
      Next
    </a>
  </p>
</div>
{{ end }}

</section>

<section class="section content">
<h1 class="title is-spaced">Create new account</h2>

<form action="/admin/merchants" method="POST">
<div class="field is-horizontal">
  <div class="field-label is-normal">
    <label class="label">Username</label>
  </div>
  <div class="field-body">
    <div class="field">
      <div class="control">
        <input class="input" type="text" name="username">
      </div>
    </div>
  </div>
</div>


<div class="field is-horizontal">
  <div class="field-label is-normal">
    <label class="label">Password</label>
  </div>
  <div class="field-body">
    <div class="field">
      <div class="control">
        <input class="input" type="password" name="password" placeholder="***">
      </div>
    </div>
  </div>
</div>

<button class="button is-primary is-pulled-right">Create</button>
</form>
</section>
